name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Python  lint, type-check, test
  # ---------------------------------------------------------------------------
  python-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lambda/
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install

      - name: Format check
        run: poetry run black --check .

      - name: Type check
        run: poetry run mypy src/ shared/

  # ---------------------------------------------------------------------------
  # Lambda zip build  verify zips are valid
  # ---------------------------------------------------------------------------
  zip-build:
    runs-on: ubuntu-latest
    needs: python-ci
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-in-project: true

      - name: Build deployment zips
        run: make zip

      - name: Validate zips
        run: |
          python3 -c "import zipfile; assert zipfile.ZipFile('lambda/dist/shorten.zip').testzip() is None"
          python3 -c "import zipfile; assert zipfile.ZipFile('lambda/dist/redirect.zip').testzip() is None"

      - uses: actions/upload-artifact@v4
        with:
          name: lambda-zips
          path: lambda/dist/*.zip
          retention-days: 7 # can be adjusted as needed, but no need to keep these around for long for this assignment

  # ---------------------------------------------------------------------------
  # Terraform fmt, validate, lint, security scan
  # ---------------------------------------------------------------------------
  terraform-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Format check
        run: terraform fmt -check -recursive terraform/

      - name: Validate dev
        run: |
          terraform -chdir=terraform/environments/dev init -backend=false
          terraform -chdir=terraform/environments/dev validate

      - name: Install tflint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash

      - name: Lint
        run: tflint --chdir=terraform/ --recursive

#      - name: Security scan  trivy
#        uses: aquasecurity/trivy-action@master
#        with:
#          scan-type: config
#          scan-ref: terraform/
#          exit-code: 1
#          severity: HIGH,CRITICAL

      - name: Security scan checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          quiet: true
          soft_fail: false