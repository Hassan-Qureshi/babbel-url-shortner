name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      version:
        description: "Lambda version number to roll back to"
        required: true
        type: string
      smoke_test_code:
        description: "Known short code for redirect smoke testing in prod (optional for dev/staging)"
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'prod' && 'production' || inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+$ ]]; then
            echo "❌ VERSION must be a positive integer, got: ${{ inputs.version }}"
            exit 1
          fi
          if [ "${{ inputs.environment }}" = "prod" ] && [ -z "${{ inputs.smoke_test_code }}" ]; then
            echo "❌ smoke_test_code is required for prod rollback verification"
            exit 1
          fi
          echo "Rolling back ${{ inputs.environment }} to version ${{ inputs.version }}"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Verify version exists
        run: |
          for fn in shorten redirect; do
            FUNC_NAME="url-shortener-${fn}-${{ inputs.environment }}"
            echo "Checking ${FUNC_NAME} version ${{ inputs.version }}..."
            aws lambda get-function \
              --function-name "${FUNC_NAME}" \
              --qualifier "${{ inputs.version }}" \
              --query 'Configuration.{Version:Version,LastModified:LastModified,Runtime:Runtime}' \
              --output table
          done

      - name: Rollback shorten function
        run: |
          aws lambda update-alias \
            --function-name "url-shortener-shorten-${{ inputs.environment }}" \
            --name live \
            --function-version "${{ inputs.version }}"
          echo "✅ shorten alias 'live' → version ${{ inputs.version }}"

      - name: Rollback redirect function
        run: |
          aws lambda update-alias \
            --function-name "url-shortener-redirect-${{ inputs.environment }}" \
            --name live \
            --function-version "${{ inputs.version }}"
          echo "✅ redirect alias 'live' → version ${{ inputs.version }}"

      - name: Verify rollback
        run: |
          for fn in shorten redirect; do
            FUNC_NAME="url-shortener-${fn}-${{ inputs.environment }}"
            CURRENT=$(aws lambda get-alias \
              --function-name "${FUNC_NAME}" \
              --name live \
              --query 'FunctionVersion' \
              --output text)
            echo "${FUNC_NAME}:live → version ${CURRENT}"
            if [ "${CURRENT}" != "${{ inputs.version }}" ]; then
              echo "❌ Version mismatch! Expected ${{ inputs.version }}, got ${CURRENT}"
              exit 1
            fi
          done
          echo ""
          echo "✅ Rollback verified. Both functions on version ${{ inputs.version }}."

      - name: Terraform init
        run: terraform -chdir=terraform/environments/${{ inputs.environment }} init

      - name: Smoke test API
        if: inputs.environment == 'dev' || inputs.environment == 'staging'
        run: |
          echo "Waiting 5s for alias propagation..."
          sleep 5

          API_URL=$(terraform -chdir=terraform/environments/${{ inputs.environment }} output -raw api_endpoint)
          API_KEY=$(terraform -chdir=terraform/environments/${{ inputs.environment }} output -raw api_key_value)

          CREATE_RESPONSE=$(curl -sS -X POST "$API_URL/shorten" \
            -H "Content-Type: application/json" \
            -H "x-api-key: $API_KEY" \
            -d '{"url":"https://example.com/rollback-test"}')

          CODE=$(printf '%s' "$CREATE_RESPONSE" | python3 -c 'import json,sys; print(json.load(sys.stdin)["code"])')

          curl -sS -o /dev/null -D /tmp/rollback_headers "$API_URL/$CODE"
          grep -q '^HTTP/.* 301' /tmp/rollback_headers

          echo "✅ Smoke test passed"

      - name: Smoke test redirect only
        if: inputs.environment == 'prod'
        run: |
          echo "Waiting 5s for alias propagation..."
          sleep 5

          API_URL=$(terraform -chdir=terraform/environments/prod output -raw api_endpoint)

          curl -sS -o /dev/null -D /tmp/prod_rollback_headers "$API_URL/${{ inputs.smoke_test_code }}"
          grep -q '^HTTP/.* 301' /tmp/prod_rollback_headers

          echo "✅ Prod redirect smoke test passed"
