name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      target:
        description: "Function target to roll back"
        required: true
        type: choice
        options:
          - both
          - shorten
          - redirect
      version:
        description: "Lambda version number to roll back to"
        required: true
        type: string
      smoke_test_code:
        description: "Known short code for redirect smoke testing in prod (optional for dev/staging)"
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'prod' && 'production' || inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+$ ]]; then
            echo "❌ VERSION must be a positive integer, got: ${{ inputs.version }}"
            exit 1
          fi
          if [ "${{ inputs.environment }}" = "prod" ] && [ -z "${{ inputs.smoke_test_code }}" ]; then
            echo "❌ smoke_test_code is required for prod rollback verification"
            exit 1
          fi
          echo "Rolling back target=${{ inputs.target }} in ${{ inputs.environment }} to version ${{ inputs.version }}"

      - name: Debug role ARN
        run: |
          echo "ROLE_TO_ASSUME=${{ vars.AWS_DEPLOY_ROLE_ARN }}"
          if [ -z "${{ vars.AWS_DEPLOY_ROLE_ARN }}" ]; then
            echo "❌ AWS_DEPLOY_ROLE_ARN is empty"
            exit 1
          fi
          python3 - <<'PY'
          import re

          value = """${{ vars.AWS_DEPLOY_ROLE_ARN }}""".strip()
          print(f"repr={value!r}")
          if not re.fullmatch(r"arn:aws:iam::\d{12}:role/.+", value):
              raise SystemExit("❌ AWS_DEPLOY_ROLE_ARN is not a valid IAM role ARN format")
          print("✅ ARN format looks valid")
          PY

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Verify version exists
        run: |
          if [ "${{ inputs.target }}" = "both" ]; then
            FUNCTIONS="shorten redirect"
          else
            FUNCTIONS="${{ inputs.target }}"
          fi

          for fn in $FUNCTIONS; do
            FUNC_NAME="url-shortener-${fn}-${{ inputs.environment }}"
            echo "Checking ${FUNC_NAME} version ${{ inputs.version }}..."
            aws lambda get-function \
              --function-name "${FUNC_NAME}" \
              --qualifier "${{ inputs.version }}" \
              --query 'Configuration.{Version:Version,LastModified:LastModified,Runtime:Runtime}' \
              --output table
          done

      - name: Rollback shorten function
        if: inputs.target == 'both' || inputs.target == 'shorten'
        run: |
          aws lambda update-alias \
            --function-name "url-shortener-shorten-${{ inputs.environment }}" \
            --name live \
            --function-version "${{ inputs.version }}"
          echo "✅ shorten alias 'live' → version ${{ inputs.version }}"

      - name: Rollback redirect function
        if: inputs.target == 'both' || inputs.target == 'redirect'
        run: |
          aws lambda update-alias \
            --function-name "url-shortener-redirect-${{ inputs.environment }}" \
            --name live \
            --function-version "${{ inputs.version }}"
          echo "✅ redirect alias 'live' → version ${{ inputs.version }}"

      - name: Verify rollback
        run: |
          if [ "${{ inputs.target }}" = "both" ]; then
            FUNCTIONS="shorten redirect"
          else
            FUNCTIONS="${{ inputs.target }}"
          fi

          for fn in $FUNCTIONS; do
            FUNC_NAME="url-shortener-${fn}-${{ inputs.environment }}"
            CURRENT=$(aws lambda get-alias \
              --function-name "${FUNC_NAME}" \
              --name live \
              --query 'FunctionVersion' \
              --output text)
            echo "${FUNC_NAME}:live → version ${CURRENT}"
            if [ "${CURRENT}" != "${{ inputs.version }}" ]; then
              echo "❌ Version mismatch! Expected ${{ inputs.version }}, got ${CURRENT}"
              exit 1
            fi
          done
          echo ""
          echo "✅ Rollback verified. Both functions on version ${{ inputs.version }}."

      - name: Terraform init
        run: terraform -chdir=terraform/environments/${{ inputs.environment }} init

      - name: Smoke test API
        if: (inputs.environment == 'dev' || inputs.environment == 'staging') && (inputs.target == 'both' || inputs.target == 'shorten')
        run: |
          echo "Waiting 5s for alias propagation..."
          sleep 5

          API_URL=$(terraform -chdir=terraform/environments/${{ inputs.environment }} output -raw api_endpoint)
          API_KEY=$(terraform -chdir=terraform/environments/${{ inputs.environment }} output -raw api_key_value)

          HTTP_STATUS=$(curl -sS -o /tmp/create_response.json -w "%{http_code}" -X POST "$API_URL/shorten" \
            -H "Content-Type: application/json" \
            -H "x-api-key: $API_KEY" \
            -d '{"url":"https://example.com/rollback-test"}')

          echo "Create status: ${HTTP_STATUS}"
          cat /tmp/create_response.json
          echo ""

          if [ "${HTTP_STATUS}" != "201" ]; then
            echo "❌ POST /shorten failed during rollback smoke test"
            exit 1
          fi

          CODE=$(python3 -c 'import json; print(json.load(open("/tmp/create_response.json"))["code"])')

          curl -sS -o /dev/null -D /tmp/rollback_headers "$API_URL/$CODE"
          grep -q '^HTTP/.* 301' /tmp/rollback_headers

          echo "✅ Smoke test passed"

      - name: Smoke test redirect only non-prod
        if: (inputs.environment == 'dev' || inputs.environment == 'staging') && inputs.target == 'redirect'
        run: |
          echo "Waiting 5s for alias propagation..."
          sleep 5

          API_URL=$(terraform -chdir=terraform/environments/${{ inputs.environment }} output -raw api_endpoint)

          curl -sS -o /dev/null -D /tmp/redirect_only_headers "$API_URL/${{ inputs.smoke_test_code }}"
          grep -q '^HTTP/.* 301' /tmp/redirect_only_headers

          echo "✅ Redirect smoke test passed"

      - name: Smoke test redirect only
        if: inputs.environment == 'prod' && (inputs.target == 'both' || inputs.target == 'redirect')
        run: |
          echo "Waiting 5s for alias propagation..."
          sleep 5

          API_URL=$(terraform -chdir=terraform/environments/prod output -raw api_endpoint)

          curl -sS -o /dev/null -D /tmp/prod_rollback_headers "$API_URL/${{ inputs.smoke_test_code }}"
          grep -q '^HTTP/.* 301' /tmp/prod_rollback_headers

          echo "✅ Prod redirect smoke test passed"
