name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      version:
        description: "Lambda version number to roll back to (run 'make list-versions ENV=xxx' to find it)"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'prod' && 'production' || inputs.environment }}
    steps:
      - name: Validate inputs
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+$ ]]; then
            echo "❌ VERSION must be a positive integer, got: ${{ inputs.version }}"
            exit 1
          fi
          echo "Rolling back ${{ inputs.environment }} to version ${{ inputs.version }}"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: eu-central-1

      - name: Verify version exists
        run: |
          for fn in shorten redirect; do
            FUNC_NAME="url-shortener-${fn}-${{ inputs.environment }}"
            echo "Checking ${FUNC_NAME} version ${{ inputs.version }}..."
            aws lambda get-function \
              --function-name "${FUNC_NAME}" \
              --qualifier "${{ inputs.version }}" \
              --query 'Configuration.{Version:Version,LastModified:LastModified,Runtime:Runtime}' \
              --output table
          done

      - name: Rollback shorten function
        run: |
          aws lambda update-alias \
            --function-name "url-shortener-shorten-${{ inputs.environment }}" \
            --name live \
            --function-version "${{ inputs.version }}"
          echo "✅ shorten alias 'live' → version ${{ inputs.version }}"

      - name: Rollback redirect function
        run: |
          aws lambda update-alias \
            --function-name "url-shortener-redirect-${{ inputs.environment }}" \
            --name live \
            --function-version "${{ inputs.version }}"
          echo "✅ redirect alias 'live' → version ${{ inputs.version }}"

      - name: Verify rollback
        run: |
          for fn in shorten redirect; do
            FUNC_NAME="url-shortener-${fn}-${{ inputs.environment }}"
            CURRENT=$(aws lambda get-alias \
              --function-name "${FUNC_NAME}" \
              --name live \
              --query 'FunctionVersion' \
              --output text)
            echo "${FUNC_NAME}:live → version ${CURRENT}"
            if [ "${CURRENT}" != "${{ inputs.version }}" ]; then
              echo "❌ Version mismatch! Expected ${{ inputs.version }}, got ${CURRENT}"
              exit 1
            fi
          done
          echo ""
          echo "✅ Rollback verified. Both functions on version ${{ inputs.version }}."

      - name: Smoke test
        if: inputs.environment == 'dev' || inputs.environment == 'staging'
        run: |
          echo "Waiting 5s for alias propagation..."
          sleep 5
          # Quick health check — invoke the shorten function
          aws lambda invoke \
            --function-name "url-shortener-shorten-${{ inputs.environment }}" \
            --qualifier live \
            --payload '{"httpMethod":"POST","path":"/shorten","headers":{},"body":"{\"url\":\"https://example.com/rollback-test\"}","isBase64Encoded":false,"requestContext":{"stage":"test","requestId":"rollback-test","identity":{"sourceIp":"127.0.0.1"}},"resource":"/shorten"}' \
            /tmp/response.json
          STATUS=$(cat /tmp/response.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('statusCode','unknown'))")
          echo "Response status: ${STATUS}"
          if [ "${STATUS}" = "201" ] || [ "${STATUS}" = "400" ]; then
            echo "✅ Smoke test passed (function is responding)"
          else
            echo "⚠️  Unexpected status ${STATUS} — check logs"
          fi

