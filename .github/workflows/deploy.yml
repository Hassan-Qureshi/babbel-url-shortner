name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-in-project: true

      - name: Build deployment zips
        run: make zip

      - uses: actions/upload-artifact@v4
        with:
          name: lambda-zips
          path: lambda/dist/*.zip

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: eu-central-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - uses: actions/download-artifact@v4
        with:
          name: lambda-zips
          path: lambda/dist/

      - name: Terraform init
        run: terraform -chdir=terraform/environments/dev init

      - name: Terraform apply
        run: |
          terraform -chdir=terraform/environments/dev apply -auto-approve \
            -var="shorten_zip_path=$GITHUB_WORKSPACE/lambda/dist/shorten.zip" \
            -var="redirect_zip_path=$GITHUB_WORKSPACE/lambda/dist/redirect.zip"

  smoke-test-dev:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: eu-central-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform init
        run: terraform -chdir=terraform/environments/dev init

      - name: Smoke test API
        run: |
          API_URL=$(terraform -chdir=terraform/environments/dev output -raw api_endpoint)
          API_KEY=$(terraform -chdir=terraform/environments/dev output -raw api_key_value)

          CREATE_RESPONSE=$(curl -sS -X POST "$API_URL/shorten" \
            -H "Content-Type: application/json" \
            -H "x-api-key: $API_KEY" \
            -d '{"url":"https://example.com/smoke-test"}')

          CODE=$(printf '%s' "$CREATE_RESPONSE" | python3 -c 'import json,sys; print(json.load(sys.stdin)["code"])')

          curl -sS -o /dev/null -D /tmp/redirect_headers "$API_URL/$CODE"
          grep -q '^HTTP/.* 301' /tmp/redirect_headers

  deploy-staging:
    runs-on: ubuntu-latest
    needs: smoke-test-dev
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: eu-central-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - uses: actions/download-artifact@v4
        with:
          name: lambda-zips
          path: lambda/dist/

      - name: Terraform init
        run: terraform -chdir=terraform/environments/staging init

      - name: Terraform apply
        run: |
          terraform -chdir=terraform/environments/staging apply -auto-approve \
            -var="shorten_zip_path=$GITHUB_WORKSPACE/lambda/dist/shorten.zip" \
            -var="redirect_zip_path=$GITHUB_WORKSPACE/lambda/dist/redirect.zip"

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: eu-central-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - uses: actions/download-artifact@v4
        with:
          name: lambda-zips
          path: lambda/dist/

      - name: Terraform init
        run: terraform -chdir=terraform/environments/prod init

      - name: Terraform plan
        run: |
          terraform -chdir=terraform/environments/prod plan \
            -var="shorten_zip_path=$GITHUB_WORKSPACE/lambda/dist/shorten.zip" \
            -var="redirect_zip_path=$GITHUB_WORKSPACE/lambda/dist/redirect.zip"

      - name: Terraform apply
        run: |
          terraform -chdir=terraform/environments/prod apply -auto-approve \
            -var="shorten_zip_path=$GITHUB_WORKSPACE/lambda/dist/shorten.zip" \
            -var="redirect_zip_path=$GITHUB_WORKSPACE/lambda/dist/redirect.zip"
